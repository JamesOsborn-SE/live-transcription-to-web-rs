<!DOCTYPE html>
<html>
<head>
    <title>Live Transcription</title>
    <style>
        body { 
            font-family: sans-serif; 
            padding: 2rem; 
            max-width: 800px;
            margin: 0 auto;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            height: 90vh;
            overflow: hidden;
        }

        h2 { color: #ffffff; margin-bottom: 1rem; }

        .controls {
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: #aaa;
        }

        /* Scrollable container for history */
        #completed-box { 
            font-size: 1.5rem; /* Bumped up size since active-box is gone */
            color: #e0e0e0; 
            white-space: pre-wrap; 
            padding: 1.5rem;
            line-height: 1.6;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            overflow-y: auto;
            flex-grow: 1; 
        }

        /* Subtle scrollbar styling for Dark Mode */
        #completed-box::-webkit-scrollbar { width: 8px; }
        #completed-box::-webkit-scrollbar-track { background: #121212; }
        #completed-box::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        #completed-box::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body>
    <h2>Live Transcription</h2>
    
    <div class="controls">
        <input type="checkbox" id="autoscroll-toggle" checked>
        <label for="autoscroll-toggle">Auto-scroll to bottom</label>
    </div>
    
    <div id="completed-box">Awaiting speech...</div>

    <script>
        const completedBox = document.getElementById("completed-box");
        const scrollToggle = document.getElementById("autoscroll-toggle");
        
        let evtSource = null;
        let reconnectTimeout = null;
        let isFirstMessage = true;

        function connect() {
            if (evtSource) {
                evtSource.close();
            }

            evtSource = new EventSource("/events");

            evtSource.onmessage = function(event) {
                const data = JSON.parse(event.data);
                
                // Clear the "Awaiting speech..." placeholder on first real data
                if (isFirstMessage) {
                    completedBox.innerText = "";
                    isFirstMessage = false;
                }

                // Update Historical Text
                const previousContent = completedBox.innerText;
                completedBox.innerText = data.completed;

                // Auto-scroll logic
                if (scrollToggle.checked && previousContent !== data.completed) {
                    completedBox.scrollTop = completedBox.scrollHeight;
                }
            };

            evtSource.onerror = function() {
                console.warn("Connection lost. Retrying in 1s...");
                evtSource.close(); 
                clearTimeout(reconnectTimeout);
                reconnectTimeout = setTimeout(connect, 1000);
            };
        }

        connect();
    </script>
</body>
</html>
