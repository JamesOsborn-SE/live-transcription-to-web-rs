<!DOCTYPE html>
<html>

<head>
    <title>Live Transcription</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            height: 90vh;
            overflow: hidden;
        }

        h2 {
            color: #ffffff;
            margin-bottom: 1rem;
        }

        .controls {
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: #aaa;
        }

        /* Single Scrollable container for all history */
        #transcription-box {
            font-size: 1.25rem;
            color: #b0b0b0;
            /* Color for completed/finalized text */
            white-space: pre-wrap;
            padding: 1.5rem;
            line-height: 1.6;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            overflow-y: auto;
            flex-grow: 1;
            box-shadow: inset 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        /* Styling for the unfinalized words at the end of the stream */
        .active-text {
            color: #66b2ff;
            transition: color 0.2s ease-in-out;
        }

        .placeholder {
            color: #888;
            font-style: italic;
        }

        /* Subtle scrollbar styling for Dark Mode */
        #transcription-box::-webkit-scrollbar {
            width: 8px;
        }

        #transcription-box::-webkit-scrollbar-track {
            background: #121212;
        }

        #transcription-box::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        #transcription-box::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>

<body>
    <h2>Live Transcription</h2>

    <div class="controls">
        <input type="checkbox" id="autoscroll-toggle" checked>
        <label for="autoscroll-toggle">Auto-scroll to bottom</label>
    </div>

    <div id="transcription-box"><span class="placeholder">Awaiting speech...</span></div>

    <script>
        const transcriptionBox = document.getElementById("transcription-box");
        const scrollToggle = document.getElementById("autoscroll-toggle");

        let evtSource = null;
        let reconnectTimeout = null;

        function connect() {
            if (evtSource) {
                evtSource.close();
            }

            evtSource = new EventSource("/events");

            evtSource.onmessage = function (event) {
                const data = JSON.parse(event.data);

                const safeCompleted = data.completed.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                const safeActive = data.active.replace(/</g, "&lt;").replace(/>/g, "&gt;");

                let combinedHTML = "";

                // Directly stitch them together. The backend now guarantees the spacing is correct.
                if (safeCompleted) {
                    combinedHTML += `<span>${safeCompleted}</span>`;
                }

                if (safeActive) {
                    combinedHTML += `<span class="active-text">${safeActive}</span>`;
                }

                if (!safeCompleted && !safeActive.trim()) {
                    combinedHTML = '<span class="placeholder">Listening...</span>';
                }

                transcriptionBox.innerHTML = combinedHTML;

                if (scrollToggle.checked) {
                    transcriptionBox.scrollTop = transcriptionBox.scrollHeight;
                }
            };

            evtSource.onerror = function () {
                console.warn("Connection lost. Retrying in 1s...");
                transcriptionBox.innerHTML = '<span class="placeholder" style="color: #ff6b6b;">Connection lost. Reconnecting...</span>';

                evtSource.close();
                clearTimeout(reconnectTimeout);
                reconnectTimeout = setTimeout(connect, 1000);
            };
        }

        connect();
    </script>
</body>

</html>
